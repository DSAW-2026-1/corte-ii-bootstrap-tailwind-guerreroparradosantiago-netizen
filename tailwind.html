<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Tailwind Stats Card</title>

<script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="bg-[#0a0c1b] min-h-screen flex items-center justify-center font-sans">

<div class="max-w-5xl bg-[#1c1938] rounded-lg overflow-hidden flex flex-col lg:flex-row">

<div class="lg:w-1/2 p-12 text-white">

<h1 class="text-4xl font-bold leading-tight">
Get <span class="text-purple-400">insights</span> that help your business grow.
</h1>

<p class="text-gray-300 mt-6">
Discover the benefits of data analytics and make better decisions regarding revenue,
customer experience, and overall efficiency.
</p>

<div class="grid grid-cols-3 mt-10 text-center lg:text-left">

<div>
<h2 class="text-2xl font-bold">10k+</h2>
<p class="text-gray-400 text-xs tracking-widest">COMPANIES</p>
</div>

<div>
<h2 class="text-2xl font-bold">314</h2>
<p class="text-gray-400 text-xs tracking-widest">TEMPLATES</p>
</div>

<div>
<h2 class="text-2xl font-bold">12M+</h2>
<p class="text-gray-400 text-xs tracking-widest">QUERIES</p>
</div>

</div>

</div>

<div class="lg:w-1/2 relative">

<img src="./images/image-header-desktop.jpg" class="w-full h-full object-cover">

<div class="absolute inset-0 bg-purple-600 opacity-50"></div>

</div>

</div>

</body>
</html>
